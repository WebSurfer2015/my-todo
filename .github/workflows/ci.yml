name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  arch:
    name: clean-architecture gate (lint:arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root deps (dependency-cruiser) + TypeScript
        run: |
          npm install
          npm install --no-save typescript@5
      - name: Architecture gate
        run: npm run lint:arch

  core:
    name: core typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install TypeScript
        run: npm install --no-save typescript@5
      - name: Typecheck core
        working-directory: core
        run: ../node_modules/.bin/tsc --noEmit

  web:
    name: web build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci --legacy-peer-deps
      - name: Lint (errors fail; warnings advisory)
        working-directory: web
        run: npm run lint
      - name: Test
        working-directory: web
        run: npm test
      - name: Coverage report (uploaded as artifact)
        working-directory: web
        run: npx vitest run --coverage --exclude tests/firestore-rules.test.ts
      - uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: web/coverage
          retention-days: 14
      - name: Build (also runs tsc -b)
        working-directory: web
        run: npm run build

  mobile:
    name: mobile typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install
        working-directory: mobile
        run: npm ci --legacy-peer-deps
      - name: Lint (errors fail; warnings advisory)
        working-directory: mobile
        run: npm run lint
      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit -p tsconfig.json
      - name: Test
        working-directory: mobile
        run: npm test

  functions:
    name: cloud functions typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/functions/package-lock.json
      - name: Install
        working-directory: web/functions
        run: npm ci --legacy-peer-deps
      - name: Typecheck
        working-directory: web/functions
        run: npx tsc --noEmit
      - name: Test
        working-directory: web/functions
        run: npm test

  rules:
    name: firestore security rules (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Set up Java (Firestore emulator — firebase-tools needs JDK 21+)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install
        working-directory: web
        run: npm ci --legacy-peer-deps
      - name: Run rules tests against the Firestore emulator
        working-directory: web
        run: npm run test:rules
