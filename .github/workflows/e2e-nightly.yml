# Nightly Maestro E2E on the iOS simulator.
#
# Authored as part of the QA-automation program (P5). Runs the
# non-destructive seeded flow subset against a freshly built dev client.
#
# ⚠ REQUIRES SETUP before it will go green (it's wired but unverified —
# there's no macOS runner in local dev):
#   1. Repo → Settings → Secrets → Actions, add:
#        SAGELY_FIREBASE_WEB_API_KEY   (Firebase Web API key)
#        SAGELY_DEMO_EMAIL             (demo account email)
#        SAGELY_DEMO_PASSWORD          (demo account password)
#      The demo account should point at a TEST Firebase project, not prod.
#   2. Confirm the iOS Simulator device name below matches an image
#      available on the macOS runner (`xcrun simctl list devices`).
#
# Cost note: macOS minutes + a full native build (~15-25 min) — hence
# nightly + manual dispatch only, never on every push.
name: E2E (nightly)

on:
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC daily
  workflow_dispatch: {} # manual trigger from the Actions tab

jobs:
  maestro-ios:
    name: Maestro flows (iOS simulator)
    # macos-15 ships Xcode 16 — required: the Podfile (withFmtCxx17 + Expo
    # SDK 54 / RN 0.81) rejects older Xcode ("Please upgrade XCode").
    runs-on: macos-15
    # RELEASE build (see build step): a Debug build produces an Expo
    # dev-client that needs a Metro server at runtime — in CI there's none,
    # so the app boots the dev launcher and the JS never loads (every flow
    # then fails on "tab not visible"). Release embeds the JS bundle and
    # runs standalone. A cold Release compile of gRPC/Folly/abseil is slow,
    # so 120 min for the first (cache-seeding) run; cached runs are fast.
    timeout-minutes: 120
    env:
      SIM_DEVICE: iPhone 16 Pro
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile deps
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Cache the CocoaPods install + the xcodebuild DerivedData so the heavy
      # gRPC/Folly/abseil compile is reused across runs (a cold compile is
      # what blew the 60-min budget). Keyed on package-lock (native-dep proxy
      # — Podfile.lock is generated mid-run by prebuild, so we can't key on
      # it pre-restore); restore-keys lets a stale cache seed an incremental
      # build. NOTE: the cache only SAVES after a run completes within the
      # timeout — the first cold run seeds it, subsequent runs are fast.
      - name: Cache Pods + DerivedData
        uses: actions/cache@v4
        with:
          path: |
            mobile/ios/Pods
            mobile/ios/build
            ~/Library/Caches/CocoaPods
          key: ios-build-${{ runner.os }}-xc16-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: |
            ios-build-${{ runner.os }}-xc16-

      - name: Boot a simulator
        run: |
          xcrun simctl boot "$SIM_DEVICE" || true
          xcrun simctl bootstatus "$SIM_DEVICE" -b

      - name: Prebuild + pods (generate ios/, no signing yet)
        working-directory: mobile
        run: |
          npx expo prebuild --platform ios --no-install
          cd ios && pod install

      - name: Build for the simulator (signing disabled) + install
        working-directory: mobile
        # `expo run:ios` insists on a signing identity even for a simulator
        # target (run 2 failed: "No code signing certificates"). Simulator
        # builds genuinely don't need signing, so drive xcodebuild directly
        # with CODE_SIGNING_ALLOWED=NO, then install the .app on the sim.
        run: |
          # RELEASE, not Debug: a Debug build of this Expo project is a
          # dev-client that loads JS from Metro at runtime — CI has no Metro,
          # so the app sits on the dev launcher and the app JS never runs.
          # Release embeds the JS bundle (the "Bundle React Native code and
          # images" phase) so the app launches standalone. The first cold
          # compile of gRPC/Folly/abseil is slow (hence 120-min timeout +
          # the Pods/DerivedData cache); subsequent runs reuse the cache.
          # COMPILER_INDEX_STORE_ENABLE=NO skips index work CI doesn't need.
          xcodebuild \
            -workspace ios/SagelyCalmToDos.xcworkspace \
            -scheme SagelyCalmToDos \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$SIM_DEVICE" \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build
          APP_PATH="$(find ios/build/Build/Products -name '*.app' -maxdepth 2 -type d | head -1)"
          echo "Installing $APP_PATH"
          xcrun simctl install "$SIM_DEVICE" "$APP_PATH"

      - name: Seed the demo account
        working-directory: mobile
        env:
          SAGELY_FIREBASE_WEB_API_KEY: ${{ secrets.SAGELY_FIREBASE_WEB_API_KEY }}
          SAGELY_DEMO_EMAIL: ${{ secrets.SAGELY_DEMO_EMAIL }}
          SAGELY_DEMO_PASSWORD: ${{ secrets.SAGELY_DEMO_PASSWORD }}
        run: python3 scripts/seed_sample_data.py

      - name: Run the non-destructive flow subset
        working-directory: mobile
        # Excludes the destructive/standalone flows (16 sign-out,
        # 17 clear-completed) and the empty-account flows (10, 12) which
        # need clear_sample_data.py first. Everything else is seed-safe.
        #
        # 00-sign-in runs FIRST: the fresh install is signed out, so it
        # authenticates once (Firebase persists to disk → subsequent
        # flows' relaunch stays signed in). Creds passed via `-e` from
        # the same demo secrets the seed step uses.
        env:
          SAGELY_DEMO_EMAIL: ${{ secrets.SAGELY_DEMO_EMAIL }}
          SAGELY_DEMO_PASSWORD: ${{ secrets.SAGELY_DEMO_PASSWORD }}
        run: |
          maestro test \
            -e EMAIL="$SAGELY_DEMO_EMAIL" \
            -e PASSWORD="$SAGELY_DEMO_PASSWORD" \
            .maestro/flows/00-sign-in.yaml \
            .maestro/flows/01-cold-launch-lands-on-home.yaml \
            .maestro/flows/02-add-todo.yaml \
            .maestro/flows/03-toggle-done-and-strike.yaml \
            .maestro/flows/04-swipe-to-trash-and-undo.yaml \
            .maestro/flows/05-defer-all-group.yaml \
            .maestro/flows/06-pebble-lifetime-count.yaml \
            .maestro/flows/07-defer-single-via-swipe.yaml \
            .maestro/flows/08-recurring-rolling.yaml \
            .maestro/flows/09-shopping-add-item.yaml \
            .maestro/flows/11-shopping-add-store.yaml \
            .maestro/flows/13-tab-navigation.yaml \
            .maestro/flows/14-relaunch-persists-data.yaml \
            .maestro/flows/15-open-task-details-sheet.yaml \
            .maestro/flows/18-bin-reopen.yaml

      - name: Upload Maestro debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug
          path: ~/.maestro/tests
          retention-days: 7
