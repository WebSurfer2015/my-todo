version: 1
applications:
  # Sagely web app - Vite + React 18
  # Served at the original Amplify app (dev + main branches).
  # Future custom domain: app.technologyforhumanity.net
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --legacy-peer-deps
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*

