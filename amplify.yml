version: 1
applications:
  # Sagely web app — Vite + React 18
  # Served at the original Amplify app (dev + main branches).
  # Future custom domain: app.technologyforhumanity.net
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --legacy-peer-deps
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*

  # Technology For Humanity landing — static HTML + CSS, no build step.
  # Served from a separate Amplify app pointed at this appRoot.
  # Future custom domain: technologyforhumanity.net (apex).
  - appRoot: landing
    frontend:
      phases:
        build:
          commands:
            - echo "Static landing page — no build step required"
      artifacts:
        baseDirectory: .
        files:
          - '**/*'
