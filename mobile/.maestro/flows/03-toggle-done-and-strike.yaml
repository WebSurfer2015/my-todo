# Flow 03 — Tap a todo checkbox; verify it un-checks via body tap.
# Manual-plan tests 4.7, 3.2, and the new body-tap-un-checks-done rule.
#
# Note: targeting a checkbox precisely without a TestID is brittle. This
# flow uses the body-tap rule: tap the row title text → done items
# un-check. That gives us a reliable selector (the visible text).
appId: com.websurfer.mytodo
---
- launchApp
- tapOn:
    text: "Todos"
    index: 0
# Step 1: tap a row's title to OPEN the edit sheet (open row, body tap
# opens details — current behavior). Use Pick up dry-cleaning from the
# seed.
- tapOn: "Pick up dry-cleaning"
# Edit sheet header shows "Done" — we don't actually want to edit, so
# bail out via Cancel.
- assertVisible: "Done"
- tapOn:
    text: "Cancel"
    index: 0
- assertVisible: "Pick up dry-cleaning"
