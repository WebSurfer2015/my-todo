# Flow 03 — Tap an open row → it toggles to done (strike-through).
# Manual-plan tests 4.7, 3.2.
#
# Current behavior: body-tap toggles done; long-press opens edit. We
# tap a seeded open row and assert it disappears from the Open filter
# (strict Open filter unmounts done items immediately).
appId: com.websurfer.mytodo
---
- launchApp
- tapOn:
    text: "Todos, tab.*"
# Make sure we're on the Open filter so the strict-Open unmount rule
# applies — tapping a row will remove it from view.
- tapOn:
    text: "Open"
    optional: true
# Tap the row body — this is the toggle gesture.
- tapOn: "Pick up dry-cleaning"
# Row should drop out of the Open filter view. Allow a brief settle
# for the Mochi flight animation (~1.8s) before checking.
- waitForAnimationToEnd:
    timeout: 2500
- assertNotVisible: "Pick up dry-cleaning"
