# Flow 09 — Tap into the GroceryComposeSheet from the Shopping empty
# state and verify the sheet renders with the expected v1.5 surfaces
# (Add Item title + STORES picker section).
#
# Limited scope: deeper interactions (selecting a store chip, tapping
# "Add another" to commit) hit a known Maestro <> React Native
# accessibility issue — GroceryComposeSheet's outer View has
# `accessible={true}` so child elements are concatenated into the
# parent's label. `tapOn: text: ".*Add Stop & Shop.*"` matches the
# parent and taps its geometric center, not the chip. The fix is in
# the component (set `accessible={false}` on the wrapping View,
# rely on per-child `accessibilityLabel`s); tracked under future
# component a11y work, not in this flow.
appId: com.websurfer.mytodo
---
- launchApp
- tapOn:
    text: "Shopping, tab.*"
# Empty-state CTA — the EmptyStateCard's "Add your first item"
# button opens GroceryComposeSheet. When items exist instead, the
# FAB at bottom-right does the same; covered indirectly by flow 02.
- tapOn: "Add your first item"
# Header reads "Cancel  Add Item  ..." — confirm the sheet rendered.
- assertVisible:
    text: ".*Add Item.*"
# STORES section is the v1.5 multi-store affordance.
- assertVisible:
    text: ".*STORES.*"
