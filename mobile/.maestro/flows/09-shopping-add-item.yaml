# Flow 09 — Open the GroceryComposeSheet from the Shopping FAB and verify
# it renders with the expected surfaces (Add Item title + STORES picker
# with individually-addressable store chips). P1 shopping.
#
# Drives the FAB on a POPULATED shopping list (the seeded demo account has
# items, so the "Add your first item" empty-state CTA isn't present — that
# path is covered by flow 12's empty-state precondition). Post-#15 the
# sheet's children (title, STORES label, store chips) are individually
# exposed rather than collapsed into one a11y leaf.
appId: com.websurfer.mytodo
---
- stopApp
- launchApp
- tapOn:
    text: "Shopping, tab.*"
# Add-item FAB — stable testID (id) instead of a screen-percentage tap.
- tapOn:
    id: "fab"
- waitForAnimationToEnd
- assertVisible: ".*Add Item.*"
- assertVisible: ".*STORES.*"
# A store chip is individually exposed (was swallowed pre-#15).
- assertVisible: ".*Costco.*"
