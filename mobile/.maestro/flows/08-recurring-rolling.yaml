# Flow 08 — Body-tap a recurring task → a done snapshot lands in the Done
# bin and the rolling instance advances to its next occurrence.
# Manual-plan tests 9.1–9.3 (recurrence).
#
# Seed recurring tasks: "Pay credit card bill" (monthly, THIS WEEK) and
# "Yoga class" (weekly, next week → the collapsed UPCOMING section). We
# exercise the weekly one. UPCOMING is collapsed by default AND long, so
# we expand it (tap the header) then scrollUntilVisible to reach Yoga —
# a plain tapOn doesn't auto-scroll far enough.
#
# Filtering: funnel ("Filter") → status row (regex, carries a count) →
# title-bar "Done". The Done STATUS row matches "Done.*[0-9]" (it has a
# count); the bare-text title-bar "Done" applies the filter.
appId: com.websurfer.mytodo
---
- stopApp
- launchApp
- tapOn:
    text: "Todos, tab.*"
- tapOn:
    text: "Filter"
- tapOn:
    text: ".*Open.*"
- tapOn:
    text: "Done"
- waitForAnimationToEnd
# Expand the collapsed UPCOMING section, then scroll the weekly row in.
- tapOn:
    text: ".*UPCOMING.*"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: ".*Yoga class.*"
    direction: DOWN
- tapOn: ".*Yoga class.*"
- waitForAnimationToEnd:
    timeout: 3000
# Switch to the Done filter and confirm the rolled snapshot landed there.
- tapOn:
    text: "Filter"
- tapOn:
    text: "Done.*[0-9].*"
- tapOn:
    text: "Done"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: ".*Yoga class.*"
    direction: DOWN
