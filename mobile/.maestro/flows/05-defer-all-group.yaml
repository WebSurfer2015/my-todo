# Flow 05 — A section header's "Defer all →" opens the bulk-defer modal,
# pick Tomorrow. Manual-plan tests 7.5–7.7.
#
# Each section header (TODAY / CARRIED OVER / THIS WEEK / UPCOMING) has
# its own "Defer all →" action, so in the unfiltered view there are
# several. We first filter to "Carried over" (funnel → status row →
# title-bar Done) so exactly one "Defer all →" remains and the target
# group is unambiguous. Carried over seeds 2 items, so the modal title
# is "Defer all to" (count > 1).
#
# NOTE: the "Defer all →" touchable sets an accessibilityLabel
# ("Defer N carried-over to-dos" / "Defer N to-dos in <group>") which
# OVERRIDES the visible "Defer all →" text on iOS — so Maestro sees the
# label, not "Defer all". Both label variants contain "to-dos", so we
# match on that.
appId: com.websurfer.mytodo
---
- stopApp
- launchApp
- tapOn:
    text: "Todos, tab.*"
- tapOn:
    text: "Filter"
- tapOn:
    text: ".*Carried over.*"
- tapOn:
    text: "Done"
- waitForAnimationToEnd
- tapOn:
    text: ".*Defer.*to-dos.*"
- assertVisible: ".*Defer all to.*"
# First preset row commits + dismisses.
- tapOn:
    text: "Tomorrow|Next day"
- waitForAnimationToEnd
