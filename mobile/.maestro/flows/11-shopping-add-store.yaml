# Flow 11 — Open Manage Store (Shopping gear → Settings → Manage Store)
# and verify the store-management sheet renders with the "+ Add store"
# affordance and the existing stores as individually-addressable rows.
# (v1.5 routed Manage Store through the Settings sheet; the gear no longer
# opens StorePicker directly.) P1 shopping.
#
# Post-#15 the StorePicker rows ARE individually exposed (Stop & Shop /
# Costco / CVS / Trader Joe's), so this asserts real elements, not just
# the parent label.
appId: com.websurfer.mytodo
---
- stopApp
- launchApp
- tapOn:
    text: "Shopping, tab.*"
# Gear icon — top-right of the header — opens the Settings sheet.
- tapOn:
    point: 92%, 12%
- tapOn:
    text: ".*Manage Store.*"
- waitForAnimationToEnd
# StorePicker sheet renders with its store rows individually exposed
# (post-#15). The "+ Add store" footer lives in the DraggableFlatList's
# ListFooterComponent, which iOS still swallows into the list's a11y node,
# so we assert the title + a known seeded store row instead.
- assertVisible: ".*Manage Store.*"
- assertVisible: ".*Costco.*"
