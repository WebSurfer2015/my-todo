# Flow 11 — Open Manage Store via the Shopping gear and verify the
# sheet renders with the v1.5 "Add a store" inline-add affordance.
#
# Limited scope: actually adding a store (typing the name, tapping
# header Done, verifying persistence after re-open) hits the
# parent-View a11y concatenation issue in StorePicker — header
# buttons (Cancel / Done) and the "+ Add store" row get swallowed
# into the parent's label, so per-child taps require fixing the
# component's accessibility tree. Tracked as future a11y work.
appId: com.websurfer.mytodo
---
- stopApp
- launchApp
- tapOn:
    text: "Shopping, tab.*"
# Gear icon — no testID today; tap the top-right region of the header.
- tapOn:
    point: 92%, 12%
# StorePicker header reads "Cancel  Manage Store  Done" concatenated.
- assertVisible:
    text: ".*Manage Store.*"
# Inline-add CTA. v1.5 copy is "Add a store" (lowercase article).
- assertVisible:
    text: ".*Add a store.*"
