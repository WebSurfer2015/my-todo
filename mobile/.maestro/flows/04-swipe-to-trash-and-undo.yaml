# Flow 04 — Swipe-right reveals [Defer | Not Do | Delete]; tap "Not Do"
# moves the row into the merged Done bin; Undo snackbar restores it.
# Manual-plan test 4.10.
appId: com.websurfer.mytodo
---
- stopApp
- launchApp
- tapOn:
    text: "Todos, tab.*"
# Swipe RIGHT direction (finger moves rightward) reveals the LEFT
# swipe actions: [Defer | Not Do | Delete] on open rows.
- swipe:
    from:
      text: ".*Review reading group chapter.*"
    direction: LEFT
# "Not Do" was previously labeled "Move to trash" — i18n key
# moveToTrash now resolves to "Not Do" in en. The button text below
# tracks the rendered label, not the legacy name.
- tapOn:
    text: ".*Not Do.*"
# Snackbar surfaces with Undo.
- assertVisible:
    text: ".*(Tucked into Done|Undo).*"
- tapOn:
    text: "Undo"
# Row is back in the active list.
- assertVisible: ".*Review reading group chapter.*"
