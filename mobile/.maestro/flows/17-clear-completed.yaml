# Flow 17 — Clear all completed (Done filter → "Delete all permanently"
# → confirm Alert → list clears). Manual-plan P1.8.
#
# Completes a seeded row (body-tap), switches to the Done filter via the
# funnel sheet (Filter → Done status row → title-bar Done), taps the
# header "Delete all permanently", and confirms the native Alert (whose
# destructive button is the bare "Delete permanently" — distinct from the
# header's "Delete all permanently").
#
# ⚠ DESTRUCTIVE: permanently deletes the completed rows. Reseed before
# re-running flows that expect the seed.
appId: com.websurfer.mytodo
---
- stopApp
- launchApp
- tapOn:
    text: "Todos, tab.*"
# Complete a row (body-tap toggles done) so the Done bin is non-empty.
- tapOn: ".*Email therapist about Friday.*"
- waitForAnimationToEnd:
    timeout: 2500
# Switch to the Done filter (funnel → status row → title-bar Done).
- tapOn:
    text: "Filter"
- tapOn:
    text: "Done.*[0-9].*"
- tapOn:
    text: "Done"
- waitForAnimationToEnd
# Header bulk action — i18n clearAllCompleted: 'Delete all permanently'.
- assertVisible:
    text: ".*Delete all permanently.*"
- tapOn:
    text: ".*Delete all permanently.*"
# Native confirm Alert — destructive button is the bare "Delete permanently".
- tapOn:
    text: "Delete permanently"
- waitForAnimationToEnd:
    timeout: 1500
- assertNotVisible: ".*Email therapist about Friday.*"
