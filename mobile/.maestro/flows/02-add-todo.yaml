# Flow 02 — Add a todo via the empty-state CTA → ComposeSheet renders.
# Manual-plan tests 4.1–4.3 (partial — see scope note).
#
# Scope note: this flow stops at "compose sheet renders" instead of
# committing the row. The header Done button lives inside a
# concatenated parent label (RN Modal a11y quirk on iOS), so a deep
# tap on Done lands on the keyboard's lowercase "done" key instead.
# Same limitation noted on flows 09 and 11. Until the sheet is
# refactored away from <Modal>, deeper commit assertions need point-
# taps or component-side a11y fixes.
appId: com.websurfer.mytodo
---
- launchApp
- tapOn:
    text: "Todos, tab.*"
# Adaptive entry: when the list is empty, the EmptyStateCard CTA is
# the only way in (no FAB visible). On a populated list, the FAB at
# bottom-right opens the same sheet.
- tapOn: "Add a to-do"
# ComposeSheet header reads "Cancel  Add to-do  Done" as one
# concatenated accessibility label, so substring-match.
- assertVisible:
    text: ".*Add to-do.*"
