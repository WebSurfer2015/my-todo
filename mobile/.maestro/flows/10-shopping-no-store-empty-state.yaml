# Flow 10 — Shopping with zero stores configured shows the unified
# EmptyStateCard with an "Add Store" CTA. Tapping it opens Manage
# Store straight into the inline-add row.
#
# Precondition: user has zero stores configured. The dev sim
# typically has seeded stores (Stop & Shop, Costco, CVS, Trader
# Joe's) — run this flow only against a fresh install or after
# deleting all stores via Manage Store.
#
# This flow is **not part of the default e2e run** until we have a
# scripted way to reset stores before the run. Invoke explicitly:
#   maestro test mobile/.maestro/flows/10-shopping-no-store-empty-state.yaml
appId: com.websurfer.mytodo
---
- launchApp
- tapOn:
    text: "Shopping, tab.*"
- assertVisible: "No stores yet."
- assertVisible: "Add the stores you shop at."
- tapOn: "Add Store"
# Manage Store opens with the inline-add row already showing.
- assertVisible:
    text: ".*Manage Store.*"
- assertVisible:
    text: ".*Store name.*"
