# Flow 00 — Email sign-in PRELUDE (CI). Runs FIRST in the nightly.
#
# Why: a freshly-installed simulator app is signed OUT. Firebase auth
# persists to disk, so signing in ONCE here keeps every subsequent
# flow's `stopApp`/`launchApp` authenticated — the seeded data hydrates
# and the tab bar renders. Without this, all flows die on the SignIn
# screen (the historical "sign-IN stays manual" gap, see README).
#
# Idempotent: if a prior run already left us signed in, the SignIn
# controls aren't present, the conditional block is skipped, and we
# just assert the dashboard. Safe to re-run locally too.
#
# Creds: ${EMAIL} / ${PASSWORD} come from Maestro env (`-e`), wired in
# the workflow from the SAGELY_DEMO_* secrets — never hardcoded here.
#
# Selectors: testIDs on SignIn.tsx (signin-with-email / -email-input /
# -password-input / -submit); the inputs carry no searchable label.
appId: com.websurfer.mytodo
---
- stopApp
- launchApp
# Let the cold-launch splash + auth-resolve settle so the SignIn screen
# (or the Dashboard, if already authed) has actually rendered before we
# branch. Without this the `when` below was evaluated DURING the splash —
# signin-with-email wasn't on screen yet, so the whole sign-in block was
# silently SKIPPED and every later flow died signed-out.
# optional:true → when already signed in, signin-with-email never appears;
# don't fail the wait, just fall through to the Dashboard assert.
- extendedWaitUntil:
    visible:
      id: "signin-with-email"
    timeout: 20000
    optional: true
- runFlow:
    when:
      visible:
        id: "signin-with-email"
    commands:
      - tapOn:
          id: "signin-with-email"
      - tapOn:
          id: "signin-email-input"
      - inputText: ${EMAIL}
      - tapOn:
          id: "signin-password-input"
      - inputText: ${PASSWORD}
      # No hideKeyboard — it's flaky on the iOS sim ("Couldn't hide the
      # keyboard"). The SignIn form is in a KeyboardAvoidingView, so the
      # submit button stays visible above the keyboard and is tappable.
      - tapOn:
          id: "signin-submit"
# Auth + first Firestore hydrate can take a few seconds — wait it out.
- extendedWaitUntil:
    visible: "Dashboard, tab, 1 of 3"
    timeout: 30000
